<h2>首頁 + 設定頁 — 更新稿</h2>
<p class="subtitle">請確認這兩個畫面是否符合你的想像</p>

<div class="split">
  <!-- Home Page -->
  <div class="mockup">
    <div class="mockup-header">🏠 首頁</div>
    <div class="mockup-body" style="background:#0f172a;min-height:340px;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:32px 20px;position:relative;">
      <!-- Big title -->
      <div style="text-align:center;">
        <div style="font-size:2.8rem;font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,#6c63ff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1;">SPARK<br>NOTES</div>
        <div style="color:#475569;font-size:0.75rem;margin-top:8px;letter-spacing:0.08em;">你的店家筆記本</div>
      </div>

      <!-- Settings button -->
      <div style="margin-top:48px;background:#1e293b;border-radius:12px;padding:12px 28px;display:flex;align-items:center;gap:8px;border:1px solid #334155;">
        <span style="font-size:1rem;">⚙️</span>
        <span style="color:#94a3b8;font-size:0.85rem;font-weight:500;">設定</span>
      </div>
    </div>
  </div>

  <!-- Settings Page -->
  <div class="mockup">
    <div class="mockup-header">⚙️ 設定</div>
    <div class="mockup-body" style="background:#0f172a;padding:16px;min-height:340px;">

      <!-- Theme Color -->
      <div style="margin-bottom:14px;">
        <div style="color:#64748b;font-size:0.68rem;letter-spacing:0.08em;margin-bottom:6px;">主題顏色</div>
        <div style="background:#1e293b;border-radius:10px;padding:12px;">
          <div style="display:flex;gap:10px;align-items:center;justify-content:space-between;">
            <div style="width:26px;height:26px;border-radius:50%;background:#6c63ff;border:2px solid #fff;"></div>
            <div style="width:26px;height:26px;border-radius:50%;background:#ef4444;"></div>
            <div style="width:26px;height:26px;border-radius:50%;background:#10b981;"></div>
            <div style="width:26px;height:26px;border-radius:50%;background:#f59e0b;"></div>
            <div style="width:26px;height:26px;border-radius:50%;background:#0ea5e9;"></div>
            <div style="width:26px;height:26px;border-radius:50%;background:#ec4899;"></div>
            <div style="width:22px;height:22px;border-radius:50%;border:2px dashed #475569;display:flex;align-items:center;justify-content:center;">
              <span style="color:#475569;font-size:0.7rem;">＋</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Notification Settings -->
      <div style="margin-bottom:14px;">
        <div style="color:#64748b;font-size:0.68rem;letter-spacing:0.08em;margin-bottom:6px;">雷店預警通知</div>
        <div style="background:#1e293b;border-radius:10px;overflow:hidden;">
          <div style="padding:10px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #334155;">
            <div>
              <div style="color:#e2e8f0;font-size:0.8rem;">通知開關</div>
            </div>
            <div style="background:#6c63ff;border-radius:12px;width:36px;height:20px;position:relative;">
              <div style="width:16px;height:16px;background:#fff;border-radius:50%;position:absolute;right:2px;top:2px;"></div>
            </div>
          </div>
          <div style="padding:10px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #334155;">
            <div style="color:#e2e8f0;font-size:0.8rem;">警示星級門檻</div>
            <div style="color:#a78bfa;font-size:0.8rem;">≤ 2 星　▾</div>
          </div>
          <div style="padding:10px 12px;display:flex;justify-content:space-between;align-items:center;">
            <div style="color:#e2e8f0;font-size:0.8rem;">警示半徑</div>
            <div style="color:#a78bfa;font-size:0.8rem;">500 公尺　▾</div>
          </div>
        </div>
      </div>

      <!-- Export / Import -->
      <div>
        <div style="color:#64748b;font-size:0.68rem;letter-spacing:0.08em;margin-bottom:6px;">資料管理</div>
        <div style="background:#1e293b;border-radius:10px;overflow:hidden;">
          <div style="padding:10px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #334155;">
            <div>
              <div style="color:#e2e8f0;font-size:0.8rem;">📤 匯出資料</div>
              <div style="color:#64748b;font-size:0.68rem;margin-top:1px;">匯出為 JSON 檔案</div>
            </div>
            <span style="color:#475569;font-size:0.8rem;">›</span>
          </div>
          <div style="padding:10px 12px;display:flex;justify-content:space-between;align-items:center;">
            <div>
              <div style="color:#e2e8f0;font-size:0.8rem;">📥 匯入資料</div>
              <div style="color:#64748b;font-size:0.68rem;margin-top:1px;">從 JSON 檔案還原</div>
            </div>
            <span style="color:#475569;font-size:0.8rem;">›</span>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
